name: Lint

on:
  push:
    branches: [main, master, dev, feat/*, fix/*]
  pull_request:
    branches: [main, master, dev, feat/*, fix/*]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install "ruff>=0.4"

      - name: Run ruff
        run: ruff check gr4_modtool/ tests/

  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and mypy
        run: pip install -e ".[dev]"

      - name: Run mypy
        run: mypy gr4_modtool/
        continue-on-error: true # type errors are non-blocking for now
